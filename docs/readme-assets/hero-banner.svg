<svg width="1280" height="640" viewBox="0 0 1280 640" fill="none" xmlns="http://www.w3.org/2000/svg">
<defs>
  <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="640" gradientUnits="userSpaceOnUse">
    <stop stop-color="#0B1220"/>
    <stop offset="1" stop-color="#0F2A5C"/>
  </linearGradient>
  <linearGradient id="chip" x1="0" y1="0" x2="1" y2="1">
    <stop stop-color="#3B82F6"/>
    <stop offset="1" stop-color="#6366F1"/>
  </linearGradient>
  <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
    <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#020617" flood-opacity="0.35"/>
  </filter>
</defs>

<rect width="1280" height="640" rx="28" fill="url(#bg)"/>
<circle cx="1040" cy="120" r="180" fill="#3B82F6" opacity="0.08"/>
<circle cx="1140" cy="520" r="220" fill="#8B5CF6" opacity="0.08"/>
<circle cx="160" cy="520" r="180" fill="#22C55E" opacity="0.05"/>

<g filter="url(#shadow)">
  <rect x="736" y="108" width="420" height="396" rx="24" fill="#0B1730" stroke="#23365E"/>
  <rect x="770" y="146" width="224" height="40" rx="12" fill="#132443"/>
  <rect x="1008" y="146" width="114" height="40" rx="12" fill="#132443"/>
  <rect x="770" y="212" width="320" height="18" rx="9" fill="#1E335D"/>
  <rect x="770" y="242" width="272" height="18" rx="9" fill="#1E335D"/>
  <rect x="770" y="298" width="318" height="108" rx="18" fill="#16233F" stroke="#29406F"/>
  <rect x="804" y="330" width="176" height="12" rx="6" fill="#8AB4FF"/>
  <rect x="804" y="356" width="212" height="12" rx="6" fill="#4F77D2"/>
  <rect x="804" y="382" width="140" height="12" rx="6" fill="#355CA8"/>
  <rect x="770" y="434" width="320" height="36" rx="14" fill="#132443"/>
  <rect x="1104" y="434" width="18" height="18" rx="9" fill="#60A5FA"/>
</g>

<text x="92" y="154" fill="white" font-family="Arial, Helvetica, sans-serif" font-size="62" font-weight="700">
  Gemini Unified Gateway
</text>
<text x="92" y="208" fill="#BFDBFE" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="500">
  OpenAI-compatible API + Admin Dashboard + MCP server for Gemini workflows
</text>

<text x="92" y="282" fill="#E5E7EB" font-family="Arial, Helvetica, sans-serif" font-size="24">
  Unifies gemini-webapi and gemini-web-mcp-cli behind one FastAPI control plane,
</text>
<text x="92" y="318" fill="#E5E7EB" font-family="Arial, Helvetica, sans-serif" font-size="24">
  one React frontend, one model registry, and one integration surface for tools like
</text>
<text x="92" y="354" fill="#E5E7EB" font-family="Arial, Helvetica, sans-serif" font-size="24">
  Claude Desktop, Cursor, OpenCode, and OpenClaw.
</text>

<g>
  <rect x="92" y="412" width="188" height="44" rx="22" fill="url(#chip)"/>
  <text x="186" y="440" text-anchor="middle" fill="white" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700">Chat • Images • Video</text>

  <rect x="294" y="412" width="156" height="44" rx="22" fill="#14274B" stroke="#33589C"/>
  <text x="372" y="440" text-anchor="middle" fill="#DDEAFE" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700">Music • Research</text>

  <rect x="464" y="412" width="144" height="44" rx="22" fill="#14274B" stroke="#33589C"/>
  <text x="536" y="440" text-anchor="middle" fill="#DDEAFE" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700">MCP Tools</text>

  <rect x="622" y="412" width="170" height="44" rx="22" fill="#14274B" stroke="#33589C"/>
  <text x="707" y="440" text-anchor="middle" fill="#DDEAFE" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700">Model Routing</text>
</g>

<text x="92" y="530" fill="#93C5FD" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700">
  FastAPI · React · SQLite · FastMCP · Multi-account Gemini gateway
</text>
