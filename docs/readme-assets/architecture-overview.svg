<svg width="1280" height="760" viewBox="0 0 1280 760" fill="none" xmlns="http://www.w3.org/2000/svg">
<defs>
  <linearGradient id="bg2" x1="0" y1="0" x2="1280" y2="760">
    <stop stop-color="#F8FAFC"/>
    <stop offset="1" stop-color="#EEF2FF"/>
  </linearGradient>
  <linearGradient id="blue" x1="0" y1="0" x2="1" y2="1">
    <stop stop-color="#2563EB"/>
    <stop offset="1" stop-color="#4F46E5"/>
  </linearGradient>
  <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
    <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#0F172A" flood-opacity="0.12"/>
  </filter>
</defs>
<rect width="1280" height="760" rx="28" fill="url(#bg2)"/>

<text x="640" y="78" text-anchor="middle" fill="#0F172A" font-family="Arial, Helvetica, sans-serif" font-size="38" font-weight="700">
Architecture overview
</text>
<text x="640" y="116" text-anchor="middle" fill="#475569" font-family="Arial, Helvetica, sans-serif" font-size="20">
How requests move through the gateway
</text>

<!-- Clients -->
<g filter="url(#soft)">
  <rect x="70" y="180" width="260" height="360" rx="26" fill="white" stroke="#CBD5E1"/>
  <text x="200" y="228" text-anchor="middle" fill="#1E293B" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700">Clients</text>
  <rect x="100" y="264" width="200" height="52" rx="16" fill="#EFF6FF"/>
  <text x="200" y="297" text-anchor="middle" fill="#1D4ED8" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700">OpenAI SDK / apps</text>
  <rect x="100" y="332" width="200" height="52" rx="16" fill="#EEF2FF"/>
  <text x="200" y="365" text-anchor="middle" fill="#4338CA" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700">Admin dashboard</text>
  <rect x="100" y="400" width="200" height="52" rx="16" fill="#F0FDF4"/>
  <text x="200" y="433" text-anchor="middle" fill="#15803D" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700">MCP clients</text>
  <rect x="100" y="468" width="200" height="52" rx="16" fill="#FEF3C7"/>
  <text x="200" y="501" text-anchor="middle" fill="#B45309" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700">OpenClaw plugin</text>
</g>

<!-- Gateway -->
<g filter="url(#soft)">
  <rect x="390" y="130" width="500" height="470" rx="28" fill="white" stroke="#BFDBFE"/>
  <rect x="430" y="172" width="420" height="70" rx="20" fill="url(#blue)"/>
  <text x="640" y="216" text-anchor="middle" fill="white" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700">Gemini Unified Gateway</text>

  <rect x="430" y="272" width="190" height="90" rx="20" fill="#EFF6FF" stroke="#93C5FD"/>
  <text x="525" y="312" text-anchor="middle" fill="#1D4ED8" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700">REST APIs</text>
  <text x="525" y="340" text-anchor="middle" fill="#475569" font-family="Arial, Helvetica, sans-serif" font-size="16">/v1 + /native + /admin</text>

  <rect x="660" y="272" width="190" height="90" rx="20" fill="#EEF2FF" stroke="#A5B4FC"/>
  <text x="755" y="312" text-anchor="middle" fill="#4338CA" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700">MCP server</text>
  <text x="755" y="340" text-anchor="middle" fill="#475569" font-family="Arial, Helvetica, sans-serif" font-size="16">10 tools + token auth</text>

  <rect x="430" y="392" width="190" height="90" rx="20" fill="#F8FAFC" stroke="#CBD5E1"/>
  <text x="525" y="432" text-anchor="middle" fill="#0F172A" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700">Model registry</text>
  <text x="525" y="460" text-anchor="middle" fill="#475569" font-family="Arial, Helvetica, sans-serif" font-size="16">aliases + capability metadata</text>

  <rect x="660" y="392" width="190" height="90" rx="20" fill="#F8FAFC" stroke="#CBD5E1"/>
  <text x="755" y="432" text-anchor="middle" fill="#0F172A" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700">Control plane</text>
  <text x="755" y="460" text-anchor="middle" fill="#475569" font-family="Arial, Helvetica, sans-serif" font-size="16">accounts, logs, analytics</text>

  <rect x="430" y="512" width="420" height="52" rx="18" fill="#F1F5F9"/>
  <text x="640" y="545" text-anchor="middle" fill="#334155" font-family="Arial, Helvetica, sans-serif" font-size="19" font-weight="700">SQLite + uploads + request logs + job events</text>
</g>

<!-- Providers -->
<g filter="url(#soft)">
  <rect x="950" y="180" width="260" height="360" rx="26" fill="white" stroke="#CBD5E1"/>
  <text x="1080" y="228" text-anchor="middle" fill="#1E293B" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700">Providers</text>
  <rect x="980" y="264" width="200" height="70" rx="18" fill="#EFF6FF"/>
  <text x="1080" y="300" text-anchor="middle" fill="#1D4ED8" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700">gemini-webapi</text>
  <text x="1080" y="322" text-anchor="middle" fill="#475569" font-family="Arial, Helvetica, sans-serif" font-size="15">chat, streaming, image flows</text>

  <rect x="980" y="356" width="200" height="70" rx="18" fill="#EEF2FF"/>
  <text x="1080" y="392" text-anchor="middle" fill="#4338CA" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700">gemini-web-mcp-cli</text>
  <text x="1080" y="414" text-anchor="middle" fill="#475569" font-family="Arial, Helvetica, sans-serif" font-size="15">imagen, veo, lyria, research</text>

  <rect x="980" y="448" width="200" height="70" rx="18" fill="#F8FAFC"/>
  <text x="1080" y="484" text-anchor="middle" fill="#0F172A" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700">Gemini accounts</text>
  <text x="1080" y="506" text-anchor="middle" fill="#475569" font-family="Arial, Helvetica, sans-serif" font-size="15">cookies, browser import, profiles</text>
</g>

<!-- arrows -->
<path d="M330 360H390" stroke="#60A5FA" stroke-width="8" stroke-linecap="round"/>
<path d="M890 360H950" stroke="#60A5FA" stroke-width="8" stroke-linecap="round"/>
<circle cx="360" cy="360" r="7" fill="#60A5FA"/>
<circle cx="920" cy="360" r="7" fill="#60A5FA"/>

<text x="640" y="682" text-anchor="middle" fill="#475569" font-family="Arial, Helvetica, sans-serif" font-size="18">
One gateway gives you one API surface, one admin experience, and one MCP endpoint across multiple Gemini access methods.
</text>
</svg>